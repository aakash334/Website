<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-100 to-purple-100 flex justify-center items-center min-h-screen p-4">

    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md transition-transform hover:scale-105">
        
        <h1 class="text-2xl font-semibold text-gray-800 mb-2 text-center">Login to Your Account</h1>
        <p class="text-center text-gray-500 mb-6">Welcome back! Please enter your details.</p>

        <form id="login-form" class="space-y-4">
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" class="shadow border rounded w-full py-2 px-3 text-gray-700" placeholder="Enter your username" required>
                <div id="username-error" class="text-red-500 text-xs italic hidden"></div>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" class="shadow border rounded w-full py-2 px-3 text-gray-700" placeholder="Enter your password" required>
                    
                    <button type="button" id="toggle-password" class="absolute right-3 top-2 text-gray-500">
                        👁️
                    </button>
                </div>
                <div id="password-error" class="text-red-500 text-xs italic hidden"></div>
            </div>

            <!-- New Feature -->
            <div class="flex items-center justify-between">
                <label class="flex items-center text-sm">
                    <input type="checkbox" class="mr-2"> Remember me
                </label>
                <a href="#" class="text-sm text-blue-500 hover:underline">Forgot Password?</a>
            </div>

            <button type="submit" class="bg-gradient-to-r from-green-400 to-blue-500 text-white font-bold py-2 px-4 rounded-full w-full hover:scale-105 transition">
                Log In
            </button>
        </form>

        <div class="mt-6 text-center text-gray-600">
            Don't have an account? 
            <a href="sign_up.html" class="text-blue-500 font-semibold hover:underline">Sign up</a>
        </div>
    </div>

    <script>
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const form = document.getElementById('login-form');
        const toggle = document.getElementById('toggle-password');

        toggle.addEventListener('click', () => {
            password.type = password.type === "password" ? "text" : "password";
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            if (!username.value || !password.value) {
                alert("Please fill all fields!");
                return;
            }

            const data = localStorage.getItem('user-data');

            if (data) {
                const user = JSON.parse(data);

                if (username.value === user.username && password.value === user.password) {
                    alert("✅ Login Successful!");
                    window.location.href = "index.html";
                } else {
                    alert("❌ Invalid username or password");
                }
            } else {
                alert("⚠️ No account found. Please sign up first.");
                window.location.href = "sign_up.html";
            }
        });
    </script>

</body>
</html>
